<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VIRTUAL LOT - TAMAN PERUMAHAN</title>

    <link rel="stylesheet" href="css/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* CSS GLOBAL */
        html, body {
            margin:0;
            padding:0;
            height:100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5e6be;
        }
        #map { height:100vh; z-index: 1; }

        /* ===== HEADER UTAMA ===== */
        #header {
            position:absolute;
            top:0;
            left:0;
            right:0;
            height:70px;
            background:#1b5e20;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:12px;
            z-index:1000;
        }
        #header img { height:45px; }
        #header .custom-font {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* ===== BUTANG MENU UTAMA (SIDE TAB) ===== */
        #toggleBtn {
            position: absolute;
            top: 100px; 
            left: 0;
            z-index: 1100;
            background-color: #1a4d1a;
            color: white;
            padding: 12px 18px;
            border: none;
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            box-shadow: 4px 0 8px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        #toggleBtn:hover { background-color: #2e7d32; }

        .bar { width: 25px; height: 3px; background-color: white; margin: 2px 0; border-radius: 2px; }
        .btn-label { font-size: 13px; font-weight: 600; text-align: center; line-height: 1.2; }

        /* ===== SIDEBAR ===== */
        #sidebar {
            position:absolute;
            top:0;
            left:-340px; 
            width:320px;
            height:100%;
            background:#242731;
            color: white;
            box-shadow:4px 0 15px rgba(0,0,0,0.5);
            padding:20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index:1200;
            box-sizing: border-box;
            overflow-y: auto;
        }
        #sidebar.active { left:0; }

        .closeBtn { float:right; background:none; border:none; color:#888; font-size:24px; cursor:pointer; }
        .sidebar-header { font-size: 20px; font-weight: bold; margin: 40px 0 20px 0; border-bottom: 1px solid #3d414e; padding-bottom: 15px; }
        
        /* Gaya Butang Layer dalam Sidebar */
        .layer-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .layer-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #1a1c23;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .layer-btn.active {
            background: #2e7d32;
            color: white;
            border-color: #81c784;
        }

        /* Sidebar Inputs & Buttons */
        #sidebar h3 { font-size: 14px; color: #81c784; text-transform: uppercase; margin-bottom: 10px; }
        #sidebar input { width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border: 1px solid #444; background: #1a1c23; color: white; box-sizing: border-box; }
        .btn { width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:8px; cursor:pointer; font-weight: bold; }
        .btn.primary { background:#2e7d32; color:white; }
        .btn.danger { background:#c62828; color:white; }
        .btn.export { background:#0288d1; color:white; margin-top: 5px; }
        
        .box { background:#1a1c23; padding:15px; border-radius:10px; margin-bottom:12px; border-left: 4px solid #2e7d32; }
        .box p { margin:0; font-size:11px; color:#aaa; text-transform: uppercase; }
        .box span { font-size:16px; font-weight:bold; color:#81c784; }

        /* Laraskan kedudukan Zoom Leaflet */
        .leaflet-top.leaflet-left { margin-top: 190px; }

        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(27, 94, 32, 0.9);
            color: white;
            text-align: center;
            padding: 8px 0;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>

<body>

<div id="header">
    <img src="puo.png" alt="Logo">
    <span class="custom-font">smart resident</span>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="btn-label">Menu<br>Utama</div>
</button>

<div id="sidebar">
    <button class="closeBtn" onclick="toggleSidebar()">«</button>
    <div class="sidebar-header">⚙️ Tetapan Paparan</div>

    <h3>🗺️ Jenis Paparan Peta</h3>
    <div class="layer-group">
        <button id="btnSat" class="layer-btn active" onclick="setBaseLayer('sat')">Satelit</button>
        <button id="btnStreet" class="layer-btn" onclick="setBaseLayer('street')">Jalan</button>
    </div>

    <h3>🌍 Land Explorer</h3>
    <input type="text" id="searchLot" placeholder="Masukkan No Lot">
    <button class="btn primary" onclick="searchLot()">Cari Lot</button>
    <button class="btn danger" onclick="resetMap()">Reset Peta</button>
    
    <button class="btn export" onclick="exportToPDF()">📄 Export PDF</button>

    <div class="info">
        <div class="box"><p>Total Lot</p><span id="totalLots">0</span></div>
        <div class="box"><p>No Lot Dipilih</p><span id="lotNo">-</span></div>
        <div class="box"><p>Nama Pemilik</p><span id="ownerName">-</span></div>
        <div class="box"><p>Luas Lot</p><span id="selectedArea">-</span></div>
    </div>
</div>

<div id="map"></div>
<div id="footer">Hak Cipta Terpelihara 2026 © Hzrll</div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("active");
}

// Inisialisasi Peta
var map = L.map('map', {
    zoomControl: true,
    preferCanvas: true
}).fitBounds([[2.102821,102.520895], [2.104582,102.524810]]);

// Definisi Layer
var googleStreet = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
    maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], crossOrigin: true
});

var googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
    maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], crossOrigin: true
}).addTo(map);

// Fungsi Tukar Layer (Manual)
function setBaseLayer(type) {
    if(type === 'sat') {
        map.addLayer(googleSatellite);
        map.removeLayer(googleStreet);
        document.getElementById('btnSat').classList.add('active');
        document.getElementById('btnStreet').classList.remove('active');
    } else {
        map.addLayer(googleStreet);
        map.removeLayer(googleSatellite);
        document.getElementById('btnStreet').classList.add('active');
        document.getElementById('btnSat').classList.remove('active');
    }
}

map.createPane('lotPane');
map.getPane('lotPane').style.zIndex = 650;

function styleLot(){
    return { pane:'lotPane', color:"#1b5e20", weight:1, fillColor:"#66bb6a", fillOpacity:0.7 };
}

function getOwnerName(props) {
    let values = Object.values(props);
    let longStrings = values.filter(v => typeof v === 'string' && v.length > 10);
    return longStrings.length > 0 ? longStrings[longStrings.length - 1] : "Data Tidak Ditemui";
}

function updateSidebar(props) {
    document.getElementById("lotNo").innerText = props.NO_LOT || "Tiada Data";
    document.getElementById("ownerName").innerText = getOwnerName(props);
    let values = Object.values(props);
    let area = values.find(v => typeof v === 'number' && v > 50) || "0";
    document.getElementById("selectedArea").innerText = area + " m²";
}

var lotLayer = L.geoJSON(json_LOTFINAL_0,{
    style: styleLot,
    onEachFeature: function(feature, layer){
        layer.bindPopup("<b>LOT " + feature.properties.NO_LOT + "</b>");
        document.getElementById("totalLots").innerText = json_LOTFINAL_0.features.length;
        layer.on('click', function() { updateSidebar(feature.properties); });
    }
}).addTo(map);

function searchLot(){
    var input = document.getElementById("searchLot").value.trim().toLowerCase();
    var found = false;
    lotLayer.eachLayer(function(layer){
        layer.setStyle(styleLot()); 
        if(layer.feature.properties.NO_LOT.toString().toLowerCase() === input){
            found = true;
            map.fitBounds(layer.getBounds());
            layer.setStyle({ fillColor:"#ffeb3b", color:"#f57f17", fillOpacity: 0.9, weight: 3 });
            layer.openPopup();
            updateSidebar(layer.feature.properties);
            if(!document.getElementById("sidebar").classList.contains("active")) toggleSidebar();
        }
    });
    if(!found && input !== "") alert("No Lot tidak dijumpai!");
}

function resetMap(){
    document.getElementById("searchLot").value="";
    document.getElementById("lotNo").innerText="-";
    document.getElementById("ownerName").innerText="-";
    document.getElementById("selectedArea").innerText="-";
    lotLayer.eachLayer(function(layer){ layer.setStyle(styleLot()); });
    map.closePopup();
    map.fitBounds(lotLayer.getBounds());
}

async function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const lotNo = document.getElementById("lotNo").innerText;
    const owner = document.getElementById("ownerName").innerText;
    const area = document.getElementById("selectedArea").innerText;

    if (lotNo === "-" || lotNo === "Tiada Data") {
        alert("Sila pilih lot di peta terlebih dahulu!");
        return;
    }

    const btn = document.querySelector(".btn.export");
    btn.innerText = "Generating PDF...";
    btn.disabled = true;

    try {
        const mapElement = document.getElementById('map');
        const canvas = await html2canvas(mapElement, {
            useCORS: true, 
            ignoreElements: (el) => el.classList.contains('leaflet-control-container')
        });
        const imgData = canvas.toDataURL('image/png');

        const doc = new jsPDF();
        doc.setFillColor(27, 94, 32);
        doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(18);
        doc.text("SMART RESIDENT - LAPORAN LOT TANAH", 105, 20, { align: 'center' });

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        doc.text(`Nombor Lot: ${lotNo}`, 20, 50);
        doc.text(`Nama Pemilik: ${owner}`, 20, 60);
        doc.text(`Keluasan Lot: ${area}`, 20, 70);
        doc.addImage(imgData, 'PNG', 20, 85, 170, 100); 

        doc.save(`Laporan_Lot_${lotNo}.pdf`);
    } catch (error) {
        alert("Gagal menjana PDF.");
    } finally {
        btn.innerText = "📄 Export PDF";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
