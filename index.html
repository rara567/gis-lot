<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VIRTUAL LOT - TAMAN PERUMAHAN</title>

    <link rel="stylesheet" href="css/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* CSS GLOBAL */
        html, body {
            margin:0;
            padding:0;
            height:100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5e6be;
        }
        #map { height:100vh; z-index: 1; }

        /* ===== HEADER UTAMA (SAIZ BESAR & VIDEO) ===== */
        #header {
            position:absolute;
            top:0;
            left:0;
            right:0;
            height: 120px; 
            background:#1b5e20;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:20px;
            z-index:1000;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .header-bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            z-index: 1;
            transform: translate(-50%, -50%);
            opacity: 0.4;
            object-fit: cover;
            pointer-events: none;
        }

        #header img { 
            height: 85px; /* Logo dibesarkan */
            position: relative;
            z-index: 2;
        }

        #header .custom-font {
            font-family: 'Dancing Script', cursive;
            font-size: 52px; /* Font dibesarkan untuk impak */
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
        }

        /* ===== BUTANG MENU UTAMA (KEDUDUKAN RENDAH) ===== */
        #toggleBtn {
            position: absolute;
            top: 150px; /* Diturunkan supaya tidak ganggu video header */
            left: 0;
            z-index: 1100;
            background-color: #1a4d1a;
            color: white;
            padding: 15px 22px;
            border: none;
            border-radius: 0 15px 15px 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
            transition: 0.3s ease;
        }

        #toggleBtn:hover { 
            background-color: #2e7d32;
            padding-left: 28px;
        }

        .bar { width: 30px; height: 4px; background-color: white; margin: 2px 0; border-radius: 2px; }
        .btn-label { font-size: 14px; font-weight: bold; text-align: center; }

        /* ===== SIDEBAR MODEN ===== */
        #sidebar {
            position:absolute;
            top:0;
            left:-340px; 
            width:320px;
            height:100%;
            background:#1a1c23;
            color: white;
            box-shadow:4px 0 20px rgba(0,0,0,0.6);
            padding:25px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index:1200;
            box-sizing: border-box;
            overflow-y: auto;
        }
        #sidebar.active { left:0; }

        .closeBtn { float:right; background:none; border:none; color:#ff5252; font-size:28px; cursor:pointer; }
        .sidebar-header { font-size: 22px; font-weight: bold; margin: 40px 0 20px 0; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; color: #81c784; }
        
        .widget { background: #242731; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .widget h3 { font-size: 13px; color: #81c784; text-transform: uppercase; margin: 0 0 12px 0; }
        
        .layer-group { display: flex; gap: 8px; }
        .layer-btn { flex: 1; padding: 10px; border: 1px solid #444; border-radius: 8px; background: #111; color: #ccc; cursor: pointer; font-size: 12px; font-weight: bold; }
        .layer-btn.active { background: #2e7d32; color: white; border-color: #81c784; }

        input[type=range] { width: 100%; accent-color: #2e7d32; cursor: pointer; }
        #sidebar input[type=text] { width:100%; padding:12px; border-radius:8px; border: 1px solid #444; background: #111; color: white; margin-bottom: 10px; box-sizing: border-box; }
        
        .btn { width:100%; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight: bold; margin-bottom: 10px; }
        .btn.primary { background:#2e7d32; color:white; }
        .btn.export { background:#0288d1; color:white; }
        
        .box { background:#2d303d; padding:15px; border-radius:10px; margin-bottom:12px; border-left: 5px solid #2e7d32; }
        .box p { margin:0; font-size:11px; color:#aaa; text-transform: uppercase; }
        .box span { font-size:17px; font-weight:bold; color:#fff; display: block; margin-top: 5px; word-wrap: break-word; }

        /* Zoom Control Adjustment */
        .leaflet-top.leaflet-left { margin-top: 260px; }

        #footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(27, 94, 32, 0.95);
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            z-index: 1000;
        }
    </style>
</head>

<body>

<div id="header">
    <video autoplay muted loop playsinline class="header-bg-video">
        <source src="video-mapping.mp4" type="video/mp4">
    </video>
    <img src="puo.png" alt="Logo">
    <span class="custom-font">smart resident</span>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="btn-label">Menu<br>Utama</div>
</button>

<div id="sidebar">
    <button class="closeBtn" onclick="toggleSidebar()">✖</button>
    <div class="sidebar-header">DASHBOARD GIS</div>

    <div class="widget">
        <h3>🗺️ Paparan Peta</h3>
        <div class="layer-group">
            <button id="btnSat" class="layer-btn active" onclick="setBaseLayer('sat')">Satelit</button>
            <button id="btnStreet" class="layer-btn" onclick="setBaseLayer('street')">Jalan</button>
        </div>
    </div>

    <div class="widget">
        <h3>🔍 Ketelusan Lot (Opacity)</h3>
        <input type="range" min="0" max="1" step="0.1" value="0.7" oninput="updateOpacity(this.value)">
    </div>

    <div class="widget">
        <h3>🌍 Land Explorer</h3>
        <input type="text" id="searchLot" placeholder="Masukkan No Lot...">
        <button class="btn primary" onclick="searchLot()">Cari Lot</button>
        <button class="btn" style="background:#c62828; color:white;" onclick="resetMap()">Reset Peta</button>
    </div>

    <div class="info-container">
        <div class="box"><p>No Lot</p><span id="lotNo">-</span></div>
        <div class="box"><p>Nama Pemilik</p><span id="ownerName">-</span></div>
        <div class="box"><p>Keluasan</p><span id="selectedArea">-</span></div>
    </div>
    
    <button class="btn export" onclick="exportToPDF()">📄 Generate Laporan PDF</button>
</div>

<div id="map"></div>
<div id="footer">Hak Cipta Terpelihara 2026 © Hzrll | Politeknik Ungku Omar</div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>

<script>
// Fungsi Sidebar
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("active");
}

// Inisialisasi Peta
var map = L.map('map', {zoomControl: true, preferCanvas: true}).fitBounds([[2.102821,102.520895], [2.104582,102.524810]]);

var googleStreet = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], crossOrigin: true});
var googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], crossOrigin: true}).addTo(map);

function setBaseLayer(type) {
    if(type === 'sat') {
        map.addLayer(googleSatellite); map.removeLayer(googleStreet);
        document.getElementById('btnSat').classList.add('active');
        document.getElementById('btnStreet').classList.remove('active');
    } else {
        map.addLayer(googleStreet); map.removeLayer(googleSatellite);
        document.getElementById('btnStreet').classList.add('active');
        document.getElementById('btnSat').classList.remove('active');
    }
}

// FUNGSI PINTAR: Cari Nama Pemilik dalam GeoJSON
function findOwner(props) {
    // Cari kolum yang mungkin berisi nama
    const keys = ['PEMILIK', 'NAMA', 'OWNER', 'NAME', 'PROPRIETOR', 'Pemberi'];
    for (let k of keys) {
        if (props[k] && props[k].toString().trim().length > 2) return props[k];
    }
    // Jika tidak jumpa, cari mana-mana teks panjang dalam data
    for (let key in props) {
        if (typeof props[key] === 'string' && props[key].length > 8 && key !== 'NO_LOT') {
            return props[key];
        }
    }
    return "Maklumat Tidak Tersedia";
}

function updateSidebar(props) {
    document.getElementById("lotNo").innerText = props.NO_LOT || "Tiada Data";
    document.getElementById("ownerName").innerText = findOwner(props);
    
    // Cari luas (biasanya nombor besar atau kolum AREA/LUAS)
    let area = props.AREA || props.LUAS || Object.values(props).find(v => typeof v === 'number' && v > 10) || "0";
    document.getElementById("selectedArea").innerText = area + " m²";
}

function styleLot(){
    return { color:"#1b5e20", weight:1.5, fillColor:"#66bb6a", fillOpacity:0.7 };
}

// Load Data Lot
var lotLayer = L.geoJSON(json_LOTFINAL_0,{
    style: styleLot,
    onEachFeature: function(feature, layer){
        layer.on('click', function() {
            updateSidebar(feature.properties);
            layer.bindPopup("<b>LOT " + feature.properties.NO_LOT + "</b>").openPopup();
        });
    }
}).addTo(map);

function searchLot(){
    var input = document.getElementById("searchLot").value.trim().toLowerCase();
    var found = false;
    
    lotLayer.eachLayer(function(layer){
        layer.setStyle(styleLot()); 
        if(layer.feature.properties.NO_LOT && layer.feature.properties.NO_LOT.toString().toLowerCase() === input){
            found = true;
            map.fitBounds(layer.getBounds());
            layer.setStyle({ fillColor:"#ffeb3b", color:"#f57f17", fillOpacity: 0.9, weight: 3 });
            updateSidebar(layer.feature.properties);
            layer.bindPopup("<b>LOT " + layer.feature.properties.NO_LOT + "</b>").openPopup();
            if(!document.getElementById("sidebar").classList.contains("active")) toggleSidebar();
        }
    });
    
    if(!found && input !== "") alert("No Lot " + input + " tidak dijumpai!");
}

function resetMap(){
    lotLayer.eachLayer(function(layer){ layer.setStyle(styleLot()); });
    map.fitBounds(lotLayer.getBounds());
    document.getElementById("lotNo").innerText = "-";
    document.getElementById("ownerName").innerText = "-";
    document.getElementById("selectedArea").innerText = "-";
}

function updateOpacity(val) {
    lotLayer.setStyle({ fillOpacity: val });
}

// PDF Export
async function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const lot = document.getElementById("lotNo").innerText;
    if(lot === "-" || lot === "Tiada Data") { alert("Sila pilih lot di peta dahulu!"); return; }
    
    const canvas = await html2canvas(document.getElementById('map'), {useCORS: true});
    const doc = new jsPDF();
    doc.setFontSize(16);
    doc.text("LAPORAN SMART RESIDENT", 105, 20, {align: 'center'});
    doc.setFontSize(12);
    doc.text("Nombor Lot: " + lot, 20, 35);
    doc.text("Pemilik: " + document.getElementById("ownerName").innerText, 20, 42);
    doc.text("Keluasan: " + document.getElementById("selectedArea").innerText, 20, 49);
    doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 60, 180, 100);
    doc.save("Laporan_Lot_"+lot+".pdf");
}
</script>
</body>
</html>
