<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VIRTUAL LOT - TAMAN PERUMAHAN</title>

    <link rel="stylesheet" href="css/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        /* CSS GLOBAL */
        html, body {
            margin:0;
            padding:0;
            height:100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #map { height:100vh; }

        /* ===== HEADER UTAMA ===== */
        #header {
            position:absolute;
            top:0;
            left:0;
            right:0;
            height:70px;
            background:#1b5e20;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:12px;
            z-index:1000;
        }
        #header img { height:45px; }
        #header .custom-font {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* ===== FOOTER ===== */
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(27, 94, 32, 0.9);
            color: white;
            text-align: center;
            padding: 8px 0;
            font-size: 12px;
            z-index: 1000;
            letter-spacing: 0.5px;
        }

        /* ADJUST KEDUDUKAN CONTROL PETA */
        .leaflet-top.leaflet-left { margin-top: 85px; margin-left: 10px; }
        .leaflet-top.leaflet-right { margin-top: 85px; margin-right: 10px; }

        /* Tema Gelap untuk Butang Peta */
        .leaflet-bar, .leaflet-control-layers { border: 1px solid #444 !important; box-shadow: 0 2px 8px rgba(0,0,0,0.4) !important; }
        .leaflet-bar a, .leaflet-control-layers-toggle { background-color: #242731 !important; color: white !important; }

        /* TOGGLE BUTTON SIDEBAR */
        #toggleBtn {
            position:absolute;
            top: 145px; 
            right: 15px;
            z-index: 1100;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            background: #242731;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
        }

        /* SIDEBAR DARK MODE */
        #sidebar {
            position:absolute;
            top:0;
            right:-320px;
            width:320px;
            height:100%;
            background:#242731;
            color: white;
            box-shadow:-4px 0 15px rgba(0,0,0,0.5);
            padding:20px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index:1200;
            box-sizing: border-box;
            overflow-y: auto;
        }
        #sidebar.active { right:0; }
        .closeBtn { float:right; background:none; border:none; color:#888; font-size:24px; cursor:pointer; }
        .sidebar-header { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: bold; margin: 40px 0 20px 0; border-bottom: 1px solid #3d414e; padding-bottom: 15px; }
        #sidebar h3 { color:#81c784; font-size: 16px; margin-top: 20px; }
        #sidebar input { width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border: 1px solid #444; background: #1a1c23; color: white; box-sizing: border-box; }
        .btn { width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:8px; cursor:pointer; font-weight: bold; }
        .btn.primary { background:#2e7d32; color:white; }
        .btn.danger { background:#c62828; color:white; }
        .box { background:#1a1c23; padding:15px; border-radius:10px; margin-bottom:12px; border-left: 4px solid #2e7d32; }
        .box p { margin:0; font-size:11px; color:#aaa; text-transform: uppercase; }
        .box span { font-size:16px; font-weight:bold; color:#81c784; }
    </style>
</head>

<body>

    <div id="header">
        <img src="images/puo.png" alt="Logo">
        <span class="custom-font">smart resident</span>
    </div>

    <button id="toggleBtn" onclick="toggleSidebar()">☰</button>

    <div id="sidebar">
        <button class="closeBtn" onclick="toggleSidebar()">«</button>
        <div class="sidebar-header"><span>⚙️</span> Tetapan Paparan</div>

        <h3>🌍 Land Explorer</h3>
        <input type="text" id="searchLot" placeholder="Masukkan No Lot">
        <button class="btn primary" onclick="searchLot()">Cari Lot</button>
        <button class="btn danger" onclick="resetMap()">Reset Peta</button>

        <div class="info">
            <div class="box"><p>Total Lot</p><span id="totalLots">0</span></div>
            <div class="box"><p>No Lot Dipilih</p><span id="lotNo">-</span></div>
            <div class="box"><p>Nama Pemilik</p><span id="ownerName">-</span></div>
            <div class="box"><p>Luas Lot</p><span id="selectedArea">-</span></div>
        </div>
    </div>

    <div id="map"></div>

    <div id="footer">
        Hak Cipta Terpelihara 2026 © Myn
    </div>

    <script src="js/leaflet.js"></script>
    <script src="data/LOTFINAL_0.js"></script>

    <script>
        function toggleSidebar(){
            document.getElementById("sidebar").classList.toggle("active");
        }

        var map = L.map('map').fitBounds([
            [2.102821,102.520895],
            [2.104582,102.524810]
        ]);

        var googleStreet = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
            maxZoom:20, subdomains:['mt0','mt1','mt2','mt3']
        });

        var googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
            maxZoom:20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        map.createPane('lotPane');
        map.getPane('lotPane').style.zIndex = 650;

        function styleLot(){
            return { pane:'lotPane', color:"#1b5e20", weight:1, fillColor:"#66bb6a", fillOpacity:0.7 };
        }

        // FUNGSI UNTUK MENGESAN NAMA PEMILIK SECARA AUTOMATIK
        function updateSidebarInfo(props) {
            document.getElementById("lotNo").innerText = props.NO_LOT || "Tiada Data";

            // Mencari nama pemilik: Kod ini mengimbas semua 'field' dan mengambil teks paling panjang 
            // (Kerana nama pemilik selalunya teks yang paling panjang dalam data anda)
            let detectedOwner = "Data Tidak Ditemui";
            
            // Senarai field yang mungkin mengandungi nama pemilik
            let possibleKeys = ['PEMILIK', 'Nama', 'Owner', 'field_7', 'field_8', 'field_9'];
            
            for (let key of possibleKeys) {
                if (props[key] && props[key].toString().length > 5) {
                    detectedOwner = props[key];
                    break;
                }
            }

            // Jika masih tak jumpa, cari mana-masing string > 15 aksara
            if (detectedOwner === "Data Tidak Ditemui") {
                for (let k in props) {
                    if (typeof props[k] === 'string' && props[k].length > 15) {
                        detectedOwner = props[k];
                        break;
                    }
                }
            }

            document.getElementById("ownerName").innerText = detectedOwner;
            document.getElementById("selectedArea").innerText = (props.AREA || props.field_2 || "0") + " m²";
        }

        var lotLayer = L.geoJSON(json_LOTFINAL_0,{
            style:styleLot,
            onEachFeature:function(feature, layer){
                // Fitur 360 dibuang dari popup
                layer.bindPopup(`<b>LOT ${feature.properties.NO_LOT}</b>`);

                document.getElementById("totalLots").innerText = json_LOTFINAL_0.features.length;
                
                layer.on('click', function() {
                    updateSidebarInfo(feature.properties);
                });
            }
        }).addTo(map);

        function searchLot(){
            var input = document.getElementById("searchLot").value.trim().toLowerCase();
            var found = false;

            lotLayer.eachLayer(function(layer){
                layer.setStyle(styleLot()); // Reset style asal
                
                if(layer.feature.properties.NO_LOT.toString().toLowerCase() === input){
                    found = true;
                    map.fitBounds(layer.getBounds());
                    
                    // Highlight lot yang dijumpai
                    layer.setStyle({ fillColor:"#ffeb3b", color:"#f57f17", fillOpacity: 0.9, weight: 3 });
                    layer.openPopup();
                    
                    // KEMASKINI MAKLUMAT PEMILIK DI SIDEBAR
                    updateSidebarInfo(layer.feature.properties);

                    // Buka sidebar jika tertutup
                    if(!document.getElementById("sidebar").classList.contains("active")) toggleSidebar();
                }
            });

            if(!found && input !== "") alert("No Lot tidak dijumpai!");
        }

        function resetMap(){
            document.getElementById("searchLot").value="";
            document.getElementById("lotNo").innerText="-";
            document.getElementById("ownerName").innerText="-";
            document.getElementById("selectedArea").innerText="-";
            lotLayer.eachLayer(function(layer){ layer.setStyle(styleLot()); });
            map.closePopup();
            map.fitBounds(lotLayer.getBounds());
        }

        L.control.layers(
            { "Google Street": googleStreet, "Google Satellite": googleSatellite },
            { "Lot Tanah": lotLayer }
        ).addTo(map);
    </script>
</body>
</html>
