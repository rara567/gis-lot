<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VIRTUAL LOT - PROFESSIONAL PA REPORT</title>

    <link rel="stylesheet" href="css/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* CSS GLOBAL & UI */
        html, body { margin:0; padding:0; height:100%; font-family: 'Segoe UI', sans-serif; background-color: #f5e6be; }
        #map { height:100vh; z-index: 1; }

        /* --- LOGIN SYSTEM --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f111a; display: flex; justify-content: center;
            align-items: center; z-index: 9999; transition: opacity 0.5s ease;
        }
        .login-card {
            background: #1a1c23; padding: 40px; border-radius: 15px; width: 380px;
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.7); border: 1px solid #333;
        }
        #forgotModal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #12141d; border-radius: 15px; padding: 30px; box-sizing: border-box;
            z-index: 10000; flex-direction: column; text-align: left;
        }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { color: #aaa; font-size: 13px; display: block; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #242731; color: white; box-sizing: border-box; }
        .btn-login, .btn-save { width: 100%; padding: 14px; background: transparent; border: 1px solid #444; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-login:hover { background: #1b5e20; border-color: #81c784; }

        /* --- SIDEBAR & HEADER --- */
        #header {
            position:absolute; top:0; left:0; right:0; height: 120px; 
            background:#1b5e20; color:white; display:flex; align-items:center;
            padding-left: 30px; z-index:1000; overflow: hidden;
        }
        #header .custom-font { font-family: 'Dancing Script', cursive; font-size: 52px; z-index: 2; text-shadow: 3px 3px 8px rgba(0,0,0,0.7); }
        
        #sidebar {
            position:absolute; top:0; left:-340px; width:320px; height:100%;
            background:#242731; color: white; padding:25px; transition: 0.4s;
            z-index:1200; box-sizing: border-box; overflow-y: auto;
        }
        #sidebar.active { left:0; }
        .box { background:#1a1c23; padding:15px; border-radius:10px; margin-bottom:12px; border-left: 5px solid #2e7d32; }
        .box span { font-size:16px; font-weight:bold; color:#81c784; display: block; }
        
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #242731; padding: 30px; border-radius: 15px; width: 350px; text-align: center; color: white; border: 1px solid #2e7d32; }
        
        #toggleBtn { position:absolute; top:135px; left:10px; z-index:1100; padding:12px; background:#1b5e20; color:white; border:none; border-radius:5px; cursor:pointer; }
    </style>
</head>

<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color:white;">🔐 Survey Lot PUO</h2>
        <div class="input-group">
            <label>👤 ID Pengguna:</label>
            <input type="text" id="userId" value="admin">
        </div>
        <div class="input-group">
            <label>🔑 Kata Laluan:</label>
            <input type="password" id="userPass" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="checkLogin()">Log Masuk</button>
        <p style="color:#ff5252; cursor:pointer; font-size:12px;" onclick="toggleForgotModal(true)">Lupa Kata Laluan?</p>

        <div id="forgotModal">
            <h3 style="color:white;">Reset Kata Laluan</h3>
            <div class="input-group">
                <label>Sahkan ID:</label>
                <input type="text" id="confirmId">
            </div>
            <div class="input-group">
                <label>Kata Laluan Baharu:</label>
                <input type="password" id="newPass">
            </div>
            <div class="input-group">
                <label>Sahkan semula:</label>
                <input type="password" id="confirmNewPass">
            </div>
            <button class="btn-save" onclick="saveNewPassword()">Simpan</button>
            <button class="btn-save" style="background:#444;" onclick="toggleForgotModal(false)">Batal</button>
        </div>
    </div>
</div>

<div id="header">
    <span class="custom-font">saujana putra smart resident</span>
</div>

<div id="sidebar">
    <button style="float:right; background:none; border:none; color:white; font-size:20px;" onclick="toggleSidebar()">✖</button>
    <h2 style="color:#81c784;">DASHBOARD</h2>
    <div class="widget">
        <input type="text" id="searchLot" placeholder="No Lot (e.g. 11492)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #444; background:#111; color:white;">
        <button onclick="searchLot()" style="width:100%; padding:10px; background:#2e7d32; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:5px;">Cari Lot</button>
    </div>
    <br>
    <div class="info">
        <div class="box"><p style="font-size:10px; color:#aaa; margin:0;">NO LOT</p><span id="lotNo">-</span></div>
        <div class="box"><p style="font-size:10px; color:#aaa; margin:0;">PEMILIK</p><span id="ownerName">-</span></div>
        <div class="box"><p style="font-size:10px; color:#aaa; margin:0;">KELUASAN</p><span id="selectedArea">-</span></div>
    </div>
    <button onclick="openPdfModal()" style="width:100%; padding:15px; background:#0288d1; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:8px;">📄 GENERATE PDF</button>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">MENU</button>

<div id="pdfModal" class="modal">
    <div class="modal-content">
        <h3>Penjanaan Laporan</h3>
        <p style="font-size:12px; color:#ccc;">Sila masukkan nama anda untuk pengesahan laporan.</p>
        <input type="text" id="accessorName" placeholder="Nama Pemeriksa" style="width:100%; padding:12px; margin:15px 0; border-radius:5px; border:1px solid #444; background:#111; color:white;">
        <button onclick="generateFinalPDF()" style="width:100%; padding:12px; background:#2e7d32; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:5px;">Muat Turun PDF</button>
        <button onclick="closeModal()" style="width:100%; padding:10px; background:#444; color:white; border:none; margin-top:10px; cursor:pointer; border-radius:5px;">Batal</button>
    </div>
</div>

<div id="map"></div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>

<script>
// --- AUTH LOGIC ---
const DEFAULT_ID = "admin";
function getStoredPass() { return localStorage.getItem("userPassword") || "puo123"; }

function checkLogin() {
    if (document.getElementById("userId").value === DEFAULT_ID && document.getElementById("userPass").value === getStoredPass()) {
        document.getElementById("loginOverlay").style.display = "none";
    } else { alert("ID atau Kata Laluan Salah!"); }
}

function toggleForgotModal(show) { document.getElementById("forgotModal").style.display = show ? "flex" : "none"; }

function saveNewPassword() {
    let id = document.getElementById("confirmId").value;
    let p1 = document.getElementById("newPass").value;
    let p2 = document.getElementById("confirmNewPass").value;
    if(id === DEFAULT_ID && p1 === p2 && p1 !== "") {
        localStorage.setItem("userPassword", p1);
        alert("Berjaya Disimpan! Sila log masuk semula.");
        location.reload();
    } else { alert("Maklumat tidak sah atau kata laluan tidak sepadan!"); }
}

// --- MAP LOGIC ---
var map = L.map('map', { zoomControl: false }).setView([2.1035, 102.5225], 18);
L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:20, subdomains:['mt0','mt1','mt2','mt3']}).addTo(map);

var highlightedLayers = [];
var lotLayer = L.geoJSON(json_LOTFINAL_0, {
    style: { color:"#1b5e20", weight:1, fillColor:"#66bb6a", fillOpacity:0.5 },
    onEachFeature: function(f, l) {
        l.on('click', function() {
            clearHighlight();
            highlightFeature(l);
            updateSidebar(f.properties);
        });
    }
}).addTo(map);

function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
function clearHighlight() { highlightedLayers.forEach(l => lotLayer.resetStyle(l)); highlightedLayers = []; }
function highlightFeature(l) { l.setStyle({fillColor:"#ffeb3b", fillOpacity:0.8, weight:3, color:"#f57f17"}); highlightedLayers.push(l); }

function updateSidebar(p) {
    document.getElementById("lotNo").innerText = p.NO_LOT || p.no_lot || "-";
    document.getElementById("ownerName").innerText = p.NAMA || "DATA PEMILIK TIADA";
    document.getElementById("selectedArea").innerText = (p.LUAS || "0") + " m²";
}

function searchLot() {
    let val = document.getElementById("searchLot").value.trim();
    let bounds = L.latLngBounds([]);
    let found = false;
    clearHighlight();
    lotLayer.eachLayer(l => {
        let lotNum = (l.feature.properties.NO_LOT || l.feature.properties.no_lot).toString();
        if(lotNum === val) {
            highlightFeature(l);
            updateSidebar(l.feature.properties);
            bounds.extend(l.getBounds());
            found = true;
        }
    });
    if(found) {
        map.fitBounds(bounds, {padding: [50, 50]});
        if(!document.getElementById("sidebar").classList.contains("active")) toggleSidebar();
    } else if(val !== "") { alert("No Lot " + val + " tidak dijumpai!"); }
}

// --- PDF LOGIC DENGAN LOGIK PA LENGKAP ---
function openPdfModal() { document.getElementById("pdfModal").style.display = "flex"; }
function closeModal() { document.getElementById("pdfModal").style.display = "none"; }

async function generateFinalPDF() {
    const lotNo = document.getElementById("lotNo").innerText;
    const owner = document.getElementById("ownerName").innerText;
    const area = document.getElementById("selectedArea").innerText;
    const accessor = document.getElementById("accessorName").value;
    
    if(!accessor) return alert("Sila isi nama pemeriksa!");
    
    closeModal();
    await new Promise(r => setTimeout(r, 1200)); // Tunggu rendering peta
    const canvas = await html2canvas(document.getElementById('map'), {useCORS: true, scale: 2});
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a3');

    // Drawing Layout & Frame
    doc.setLineWidth(1); doc.rect(10, 10, 400, 277); doc.line(85, 10, 85, 287);
    doc.setFont("helvetica", "bold"); doc.setFontSize(14);
    doc.text("NEGERI JOHOR", 47, 50, {align:"center"});
    doc.text("DAERAH TANGKAK", 47, 57, {align:"center"});
    doc.text("MUKIM KESANG", 47, 65, {align:"center"});
    doc.setFontSize(22); doc.text(lotNo === "-" ? "PELAN KESELURUHAN" : "LOT " + lotNo, 47, 90, {align:"center"});

    // Map content
    doc.addImage(canvas.toDataURL('image/png'), 'PNG', 90, 35, 305, 200);

    // --- LOGIK PENENTUAN PA (PA SELECTION LOGIC) ---
    // PA 413912 (Lot 11462 - 11487)
    const LOTS_PA_413912 = [
        "11462", "11463", "11464", "11465", "11466", "11467", "11468", "11469", "11470", 
        "11471", "11472", "11473", "11474", "11475", "11476", "11477", "11478", "11479", 
        "11480", "11481", "11482", "11483", "11484", "11485", "11486", "11487"
    ];

    let paFinal = "";
    let lotInt = parseInt(lotNo);

    if (lotNo === "-") {
        paFinal = "PA 413912 & PA 413913"; // Jika cetak semua
    } else if (LOTS_PA_413912.includes(lotNo)) {
        paFinal = "PA 413912";
    } else if (lotInt >= 11488 && lotInt <= 11544) {
        paFinal = "PA 413913"; // Berdasarkan senarai user: 11488 hingga 11544
    } else {
        paFinal = "PA GENERAL"; // Jika lot di luar julat
    }

    // Paparan PA Number di PDF
    doc.setFontSize(45);
    doc.text(paFinal, 100, 265);

    // Info Sampingan
    doc.setFontSize(10);
    doc.text("Pemilik: " + owner, 15, 120);
    doc.text("Luas: " + area, 15, 130);
    doc.setFontSize(12);
    doc.text("Disemak Oleh: " + accessor.toUpperCase(), 15, 255);
    doc.text("Tarikh Cetakan: " + new Date().toLocaleDateString(), 15, 263);

    doc.save("Laporan_PA_" + lotNo + ".pdf");
}
</script>
</body>
</html>
