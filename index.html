<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VIRTUAL LOT - PROFESSIONAL PA REPORT</title>

    <link rel="stylesheet" href="css/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* CSS GLOBAL */
        html, body {
            margin:0; padding:0; height:100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5e6be;
        }
        #map { height:100vh; z-index: 1; }

        /* HEADER */
        #header {
            position:absolute; top:0; left:0; right:0; height: 120px; 
            background:#1b5e20; color:white; display:flex;
            justify-content: flex-start; align-items:center;
            padding-left: 30px; gap:25px; z-index:1000;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .header-bg-video {
            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: 1; transform: translate(-50%, -50%); opacity: 0.4;
            object-fit: cover; pointer-events: none;
        }

        #header img { height: 85px; position: relative; z-index: 2; }

        #header .custom-font {
            font-family: 'Dancing Script', cursive; font-size: 52px; 
            font-weight: 700; letter-spacing: 2px; position: relative;
            z-index: 2; text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
        }

        /* MENU BUTTON */
        #toggleBtn {
            position: absolute; top: 145px; left: 0; z-index: 1100;
            background-color: #1a4d1a; color: white; padding: 15px 22px;
            border: none; border-radius: 0 15px 15px 0; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3); transition: 0.3s ease;
        }

        .bar { width: 30px; height: 4px; background-color: white; margin: 2px 0; border-radius: 2px; }

        /* SIDEBAR */
        #sidebar {
            position:absolute; top:0; left:-340px; width:320px; height:100%;
            background:#242731; color: white; box-shadow:4px 0 20px rgba(0,0,0,0.6);
            padding:25px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index:1200; box-sizing: border-box; overflow-y: auto;
        }
        #sidebar.active { left:0; }

        .sidebar-header { font-size: 22px; font-weight: bold; margin: 40px 0 20px 0; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; color: #81c784; }
        .widget { background: #1a1c23; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .widget h3 { font-size: 13px; color: #81c784; text-transform: uppercase; margin: 0 0 12px 0; }
        
        .layer-btn { flex: 1; padding: 10px; border: 1px solid #444; border-radius: 8px; background: #111; color: #ccc; cursor: pointer; font-size: 12px; font-weight: bold; }
        .layer-btn.active { background: #2e7d32; color: white; border-color: #81c784; }

        .btn { width:100%; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight: bold; margin-bottom: 10px; }
        .btn.primary { background:#2e7d32; color:white; }
        .btn.export { background:#0288d1; color:white; }
        
        .box { background:#1a1c23; padding:15px; border-radius:10px; margin-bottom:12px; border-left: 5px solid #2e7d32; }
        .box p { margin:0; font-size:11px; color:#aaa; text-transform: uppercase; }
        .box span { font-size:16px; font-weight:bold; color:#81c784; display: block; margin-top: 5px; word-wrap: break-word; }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;
        }
        .modal-content {
            background: #242731; padding: 30px; border-radius: 15px; width: 350px; text-align: center; border: 2px solid #2e7d32; color: white;
        }
        .modal-content input {
            width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box;
        }

        /* ZOOM CONTROLS */
        .custom-zoom-container { position: absolute; bottom: 50px; right: 20px; z-index: 1500; display: flex; flex-direction: column; gap: 10px; }
        .zoom-btn { width: 50px; height: 50px; background-color: #1b5e20; color: white; border: 2px solid #81c784; border-radius: 10px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(27, 94, 32, 0.95); color: white; text-align: center; padding: 10px 0; font-size: 13px; z-index: 1000; }
    </style>
</head>

<body>

<div id="header">
    <video autoplay muted loop playsinline class="header-bg-video">
        <source src="video-mapping.mp4" type="video/mp4">
    </video>
    <img src="puo.png" alt="Logo" id="logoPuo">
    <span class="custom-font">saujana putra smart resident</span>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <span style="font-size: 10px;">Menu</span>
</button>

<div id="sidebar">
    <button style="float:right; background:none; border:none; color:#ff5252; font-size:28px; cursor:pointer;" onclick="toggleSidebar()">✖</button>
    <div class="sidebar-header">DASHBOARD</div>

    <div class="widget">
        <h3>🗺️ Interface Layer</h3>
        <div style="display:flex; gap:8px;">
            <button id="btnSat" class="layer-btn active" onclick="setBaseLayer('sat')">Satellite</button>
            <button id="btnStreet" class="layer-btn" onclick="setBaseLayer('street')">Street</button>
        </div>
    </div>

    <div class="widget">
        <h3>🌍 Land Explorer</h3>
        <input type="text" id="searchLot" placeholder="Insert No Lot..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #444; background:#111; color:white; margin-bottom:10px; box-sizing:border-box;">
        <button class="btn primary" onclick="searchLot()">Find Lot</button>
        <button class="btn" style="background:#c62828; color:white;" onclick="resetMap()">Reset Lot</button>
    </div>

    <div class="info">
        <div class="box"><p>Total Lot</p><span id="totalLots">0</span></div>
        <div class="box"><p>No Lot</p><span id="lotNo">-</span></div>
        <div class="box"><p>Owner</p><span id="ownerName">-</span></div>
        <div class="box"><p>Area</p><span id="selectedArea">-</span></div>
    </div>
    
    <button class="btn export" onclick="openPdfModal()">📄 Generate PDF Lot</button>
</div>

<div id="pdfModal" class="modal">
    <div class="modal-content">
        <h3 style="color:#81c784;">📄 Penjanaan Laporan</h3>
        <p>Sila masukkan nama anda:</p>
        <input type="text" id="accessorName" placeholder="Nama Penuh...">
        <button class="btn primary" onclick="generateFinalPDF()">Muat Turun PDF</button>
        <button class="btn" style="background:#444;" onclick="closeModal()">Batal</button>
    </div>
</div>

<div class="custom-zoom-container">
    <button class="zoom-btn" onclick="map.zoomIn()">+</button>
    <button class="zoom-btn" onclick="map.zoomOut()">−</button>
</div>

<div id="map"></div>
<div id="footer">Hak Cipta Terpelihara 2026 © Hzrul | Politeknik Ungku Omar</div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>

<script>
var lastClickedLayer = null; 

var map = L.map('map', {zoomControl: false, preferCanvas: true}).fitBounds([[2.102821,102.520895], [2.104582,102.524810]]);

var googleStreet = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], crossOrigin: "anonymous"});
var googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:20, subdomains:['mt0','mt1','mt2','mt3'], crossOrigin: "anonymous"}).addTo(map);

function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("active"); }

function setBaseLayer(type) {
    if(type === 'sat') { map.addLayer(googleSatellite); map.removeLayer(googleStreet); document.getElementById('btnSat').classList.add('active'); document.getElementById('btnStreet').classList.remove('active'); }
    else { map.addLayer(googleStreet); map.removeLayer(googleSatellite); document.getElementById('btnStreet').classList.add('active'); document.getElementById('btnSat').classList.remove('active'); }
}

function getOwnerName(props) {
    let values = Object.values(props);
    let longStrings = values.filter(v => typeof v === 'string' && v.length > 10);
    return longStrings.length > 0 ? longStrings[longStrings.length - 1] : "Data Tidak Ditemui";
}

function updateSidebar(props) {
    document.getElementById("lotNo").innerText = props.NO_LOT || props.no_lot || "Tiada Data";
    document.getElementById("ownerName").innerText = getOwnerName(props);
    let values = Object.values(props);
    let area = values.find(v => typeof v === 'number' && v > 50) || "0";
    document.getElementById("selectedArea").innerText = area + " m²";
}

function highlightFeature(layer) {
    if (lastClickedLayer) lotLayer.resetStyle(lastClickedLayer); 
    layer.setStyle({ fillColor: "#ffeb3b", color: "#f57f17", fillOpacity: 0.9, weight: 3 });
    lastClickedLayer = layer;
    layer.bringToFront();
}

var lotLayer = L.geoJSON(json_LOTFINAL_0,{
    style: function() { return { color:"#1b5e20", weight:1, fillColor:"#66bb6a", fillOpacity:0.7 }; },
    onEachFeature: function(feature, layer){
        document.getElementById("totalLots").innerText = json_LOTFINAL_0.features.length;
        layer.on('click', function() {
            highlightFeature(layer); 
            updateSidebar(feature.properties);
        });
    }
}).addTo(map);

function searchLot(){
    var input = document.getElementById("searchLot").value.trim().toLowerCase();
    var found = false;
    lotLayer.eachLayer(function(layer){
        let lotVal = (layer.feature.properties.NO_LOT || layer.feature.properties.no_lot || "").toString().toLowerCase();
        if(lotVal === input){
            found = true;
            map.setView(layer.getBounds().getCenter(), 19);
            setTimeout(() => { 
                highlightFeature(layer);
                updateSidebar(layer.feature.properties);
            }, 300);
            if(!document.getElementById("sidebar").classList.contains("active")) toggleSidebar();
        }
    });
    if(!found && input !== "") alert("No Lot tidak dijumpai!");
}

function resetMap(){
    if(lastClickedLayer) lotLayer.resetStyle(lastClickedLayer);
    lastClickedLayer = null;
    document.getElementById("lotNo").innerText="-";
    document.getElementById("ownerName").innerText="-";
    document.getElementById("selectedArea").innerText="-";
    map.fitBounds(lotLayer.getBounds());
}

function openPdfModal() {
    if(document.getElementById("lotNo").innerText === "-") { alert("Sila pilih lot dahulu!"); return; }
    document.getElementById("pdfModal").style.display = "flex";
}
function closeModal() { document.getElementById("pdfModal").style.display = "none"; }

async function generateFinalPDF() {
    const accessor = document.getElementById("accessorName").value;
    if(!accessor) { alert("Sila isi nama!"); return; }
    
    const lotNo = document.getElementById("lotNo").innerText;
    const owner = document.getElementById("ownerName").innerText;
    const area = document.getElementById("selectedArea").innerText;
    
    closeModal();

    map.invalidateSize();
    await new Promise(resolve => setTimeout(resolve, 1000)); 

    const canvas = await html2canvas(document.getElementById('map'), { useCORS: true, scale: 2 });
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a3');

    let nomorPA = (lotNo === "11487") ? "PA 143912" : "PA 143913";

    // FRAME & LINE
    doc.setLineWidth(0.8); doc.rect(10, 10, 400, 277); doc.line(85, 10, 85, 287); 

    // LOGO & HEADER
    const logoImg = document.getElementById("logoPuo");
    try { doc.addImage(logoImg, 'PNG', 32, 15, 20, 25); } catch (e) {}
    doc.setFont("helvetica", "bold"); doc.setFontSize(11);
    doc.text("POLITEKNIK UNGKU OMAR", 47, 45, {align: "center"});
    doc.line(15, 48, 80, 48);

    // LOKASI INFO
    doc.setFontSize(14); doc.text("NEGERI JOHOR", 47, 58, {align: "center"});
    doc.setTextColor(255, 0, 0); doc.text("TANGKAK", 47, 65, {align: "center"});
    doc.setTextColor(0, 0, 0); doc.text("DAERAH LEDANG", 47, 72, {align: "center"});
    doc.text("MUKIM KESANG", 47, 83, {align: "center"});
    
    doc.setFontSize(16); doc.text("LOT " + lotNo, 47, 98, {align: "center"});
    doc.setFontSize(12); doc.text("SKALA 1 : 400", 47, 110, {align: "center"});

    // ==========================================
    // PENAMBAHBAIKAN: MAKLUMAT PEMILIK, LOT, LUAS
    // ==========================================
    doc.setDrawColor(200, 200, 200); doc.line(15, 120, 80, 120); // Garisan pemisah
    
    doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.setTextColor(100, 100, 100);
    doc.text("NAMA PEMILIK:", 15, 130);
    doc.setFontSize(12); doc.setTextColor(0, 0, 0);
    doc.text(owner, 15, 137, {maxWidth: 65}); // Menggunakan maxWidth supaya text wrap jika panjang

    doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.setTextColor(100, 100, 100);
    doc.text("NO. LOT:", 15, 155);
    doc.setFontSize(14); doc.setTextColor(0, 0, 0);
    doc.text(lotNo, 15, 162);

    doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.setTextColor(100, 100, 100);
    doc.text("LUAS LOT:", 15, 175);
    doc.setFontSize(14); doc.setTextColor(0, 0, 0);
    doc.text(area, 15, 182);
    
    // MAKLUMAT TAMBAHAN (FAIL)
    doc.setFontSize(9); doc.setTextColor(100, 100, 100);
    doc.text("Fail Ukur: PUBLJ 121/2009", 15, 205);
    doc.text("Fail Pej. Tanah: PTDM 3/8/83/02", 15, 212);
    doc.text("Lembar Piawai: 30 D II", 15, 219);
    doc.text("Tarikh: 4/3/2026", 15, 226);

    // PENGESAHAN
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10); doc.text("Disemak Oleh:", 15, 255);
    doc.setFont("helvetica", "bold"); doc.setFontSize(12);
    doc.text(accessor.toUpperCase(), 15, 262);
    
    // MAIN CONTENT (MAP & TITLE)
    doc.setFontSize(24); doc.text("PELAN AKUI", 242, 25, {align: "center"});
    doc.addImage(canvas.toDataURL('image/png'), 'PNG', 90, 35, 305, 200);
    
    doc.setFontSize(38); doc.text(nomorPA, 100, 265);
    
    doc.setFontSize(8); doc.setFont("helvetica", "italic");
    doc.text("Dokumen ini dijana secara digital melalui Sistem Saujana Putra Smart Resident", 242, 282, {align: "center"});

    doc.save("PA_Lot_" + lotNo + ".pdf");
}
</script>
</body>
</html>
